name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

# Go modules don't need a registry — `go install
# github.com/tcast/authio_go@vX.Y.Z` works as soon as the tag exists. This
# workflow runs the test suite on the tagged commit and then opens a
# GitHub Release with auto-generated notes so the public version history
# is reviewable.
jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.2.2
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.4.0
        with:
          go-version-file: go.mod
          cache: true
      - run: go vet ./...
      - run: go test -race -count=1 ./...
      - run: go build ./...
      - uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.2.1
        with:
          generate_release_notes: true