name: release

on:
  push:
    tags:
      - 'v*'

# Go modules don't need a registry — `go install
# github.com/tcast/authio_go@vX.Y.Z` works as soon as the tag exists. This
# workflow runs the test suite on the tagged commit and then opens a
# GitHub Release with auto-generated notes so the public version history
# is reviewable.
jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - run: go vet ./...
      - run: go test -race -count=1 ./...
      - run: go build ./...
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
