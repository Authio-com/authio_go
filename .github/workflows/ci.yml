name: ci
on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: authio-com/authio_ci/actions/setup-go@b541348760288d209bec4537fc89eb5f5306b69d
        with:
          go-version: '1.25.11'
      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: govulncheck
        run: govulncheck ./...
      - run: go vet ./...
      - run: go test -race -count=1 ./...
      - run: go build ./...