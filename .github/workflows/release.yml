name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

# Go modules don't need a registry — `go install
# github.com/tcast/authio_go@vX.Y.Z` works as soon as the tag exists. This
# workflow runs the test suite on the tagged commit and then opens a
# GitHub Release with auto-generated notes so the public version history
# is reviewable.
jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: authio-com/authio_ci/actions/setup-go@b541348760288d209bec4537fc89eb5f5306b69d
        with:
          go-version: '1.25.11'
      - run: go vet ./...
      - run: go test -race -count=1 ./...
      - run: go build ./...
      - uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.2.1
        with:
          generate_release_notes: true